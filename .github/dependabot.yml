version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    versioning-strategy: increase
    open-pull-requests-limit: 5
    groups:
      # Keep react and react-dom on the same version (they must stay aligned).
      react:
        patterns:
          - "react"
          - "react-dom"
    ignore:
      # vite >7 breaks storybook
      - dependency-name: "vite"
        versions: [">=7.0.0"]
